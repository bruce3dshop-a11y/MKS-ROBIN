; ============================================================
; HOTEND PRO - Smart PID Controller
; MKS Robin Nano V3.1 / STM32F407VET6
; PlatformIO + STM32Cube HAL (no Arduino framework)
; ============================================================

[platformio]
default_envs = mks_robin_nano_v31

[env:mks_robin_nano_v31]
platform        = ststm32
board           = genericSTM32F407VET6
framework       = stm32cube

; Application starts after 64 KB MKS bootloader
board_build.ldscript = linker/STM32F407VETx_APP.ld

; Optimization
build_flags =
    -DSTM32F4xx
    -DSTM32F407xx
    -DUSE_HAL_DRIVER
    -DHSE_VALUE=8000000
    -DVECT_TAB_OFFSET=0x10000U
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -IInclude
    -Iinclude

; Generate .bin for SD card flashing
extra_scripts = post:scripts/generate_bin.py

; Serial monitor (optional debug UART)
monitor_speed = 115200
