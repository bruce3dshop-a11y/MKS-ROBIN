name: Build HOTEND PRO Firmware

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:   # позволяет запустить вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: |
          cd hotend-pro-firmware
          pio run

      - name: Upload Robin_nano_v3.1.bin
        uses: actions/upload-artifact@v4
        with:
          name: Robin_nano_v3.1
          path: hotend-pro-firmware/Robin_nano_v3.1.bin
          if-no-files-found: error
